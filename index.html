<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Enchantment Builder</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #141720;
    --surface2: #1c2030;
    --border: #2a2f45;
    --border2: #3a4060;
    --gold: #c9a84c;
    --gold2: #e8c97a;
    --purple: #8b5cf6;
    --purple2: #a78bfa;
    --text: #e8e4d8;
    --text2: #9a9480;
    --text3: #5a5648;
    --danger: #ef4444;
    --radius: 8px;
    --radius-lg: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(139,92,246,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.06) 0%, transparent 50%);
  }

  .page {
    max-width: 720px;
    margin: 0 auto;
    padding: 3rem 1.5rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.01em;
    background: linear-gradient(135deg, var(--gold), var(--gold2), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }

  header p {
    font-size: 14px;
    color: var(--text2);
  }

  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 1.5rem; right: 1.5rem;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border2), transparent);
  }

  .card-title {
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  label {
    display: block;
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 4px;
    font-weight: 500;
  }

  input[type=text], input[type=number] {
    width: 100%;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 12px;
    font-size: 14px;
    font-family: 'DM Sans', system-ui, sans-serif;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  input[type=text]:focus, input[type=number]:focus {
    border-color: var(--purple);
    box-shadow: 0 0 0 2px rgba(139,92,246,0.15);
  }

  input[type=text]::placeholder { color: var(--text3); }

  input[type=number] {
    text-align: center;
    width: 70px;
    -moz-appearance: textfield;
  }
  input[type=number]::-webkit-inner-spin-button { display: none; }

  input[type=color] {
    width: 36px;
    height: 36px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    cursor: pointer;
    padding: 2px;
    flex-shrink: 0;
  }

  .color-section { margin-top: 1rem; }

  .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; min-height: 10px; }

  .chip {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 20px;
    padding: 3px 8px 3px 5px;
    font-size: 12px;
    font-family: monospace;
    color: var(--text2);
    animation: chipIn 0.15s ease;
  }

  @keyframes chipIn { from { opacity:0; transform: scale(0.85); } to { opacity:1; transform: scale(1); } }

  .chip-swatch {
    width: 13px; height: 13px;
    border-radius: 50%;
    border: 0.5px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
  }

  .chip-rm {
    cursor: pointer;
    color: var(--text3);
    font-size: 15px;
    line-height: 1;
    margin-left: 1px;
    transition: color 0.1s;
  }
  .chip-rm:hover { color: var(--danger); }

  .color-add-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 8px;
  }

  .preview-text {
    margin-top: 10px;
    font-size: 16px;
    font-weight: 500;
    min-height: 24px;
    padding: 6px 10px;
    background: var(--bg);
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
  }

  .btn-sm {
    background: none;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 6px 14px;
    font-size: 13px;
    font-family: 'DM Sans', system-ui, sans-serif;
    cursor: pointer;
    color: var(--text2);
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    white-space: nowrap;
  }
  .btn-sm:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.05); }

  /* Enchantment rows */
  .enchant-list { margin-bottom: 8px; }

  .enchant-row {
    display: flex;
    gap: 10px;
    align-items: center;
    padding: 8px 10px;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 6px;
    animation: chipIn 0.15s ease;
  }

  .enchant-name { flex: 1; }
  .enchant-name strong { display: block; font-size: 14px; font-weight: 500; color: var(--text); }
  .enchant-name span { font-size: 11px; color: var(--text3); font-family: monospace; }

  .level-wrap { display: flex; align-items: center; gap: 6px; }
  .level-wrap label { margin: 0; font-size: 12px; }

  .rm-btn {
    background: none; border: none;
    cursor: pointer; color: var(--text3);
    font-size: 20px; line-height: 1;
    padding: 0 4px;
    transition: color 0.1s;
    font-family: sans-serif;
  }
  .rm-btn:hover { color: var(--danger); }

  /* Autocomplete */
  .ac-wrap { position: relative; flex: 1; }

  .ac-list {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    z-index: 100;
    max-height: 210px;
    overflow-y: auto;
    display: none;
  }

  .ac-list::-webkit-scrollbar { width: 4px; }
  .ac-list::-webkit-scrollbar-track { background: transparent; }
  .ac-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .ac-item {
    padding: 7px 12px;
    cursor: pointer;
    font-size: 14px;
    font-family: 'DM Sans', system-ui, sans-serif;
    transition: background 0.08s;
  }
  .ac-item:hover, .ac-item.active { background: rgba(139,92,246,0.12); }
  .ac-item span { font-size: 11px; color: var(--text3); font-family: monospace; margin-left: 6px; }

  .add-enchant-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 4px;
  }

  /* Generate button */
  .gen-btn {
    width: 100%;
    padding: 12px;
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.04em;
    cursor: pointer;
    border-radius: var(--radius);
    border: 0.5px solid var(--gold);
    background: linear-gradient(135deg, rgba(201,168,76,0.12), rgba(232,201,122,0.06));
    color: var(--gold2);
    margin-top: 0.5rem;
    transition: background 0.15s, box-shadow 0.15s;
  }
  .gen-btn:hover {
    background: linear-gradient(135deg, rgba(201,168,76,0.22), rgba(232,201,122,0.12));
    box-shadow: 0 0 18px rgba(201,168,76,0.15);
  }
  .gen-btn:active { transform: scale(0.99); }

  /* Output */
  .output-wrap { margin-top: 1rem; display: none; }

  .output-block {
    background: #09090f;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    line-height: 1.8;
    color: #a0e0a0;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .output-actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }

  .copy-btn {
    background: none;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 6px 16px;
    font-size: 13px;
    font-family: 'DM Sans', system-ui, sans-serif;
    cursor: pointer;
    color: var(--text2);
    transition: all 0.15s;
  }
  .copy-btn:hover { border-color: var(--purple2); color: var(--purple2); }
  .copy-btn.copied { border-color: #4ade80; color: #4ade80; }

  hr.divider {
    border: none;
    border-top: 0.5px solid var(--border);
    margin: 0.75rem 0;
  }

  .empty-enchants {
    text-align: center;
    font-size: 14px;
    color: var(--text3);
    font-style: italic;
    padding: 1rem 0 0.5rem;
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <h1>⚔ Enchantment Builder</h1>
    <p>Craft custom item commands for your Minecraft server</p>
  </header>

  <div class="card">
    <div class="card-title">Item Name</div>
    <label>Display name</label>
    <input type="text" id="itemName" placeholder="e.g. Blade of Eternity" oninput="updatePreview()">
    <div class="color-section">
      <label>Gradient colors — add one or more hex colors</label>
      <div class="chips" id="nameChips"></div>
      <div class="color-add-row">
        <input type="color" id="nameColorPick" value="#ff4444">
        <button class="btn-sm" onclick="addColor('name')">+ Add color</button>
      </div>
      <div class="preview-text" id="namePreview" style="color:#5a5648;font-size:14px">Name preview will appear here</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Item Lore</div>
    <label>Lore text</label>
    <input type="text" id="itemLore" placeholder="e.g. Forged in the fires of the Nether" oninput="updatePreview()">
    <div class="color-section">
      <label>Gradient colors — add one or more hex colors</label>
      <div class="chips" id="loreChips"></div>
      <div class="color-add-row">
        <input type="color" id="loreColorPick" value="#aaaaff">
        <button class="btn-sm" onclick="addColor('lore')">+ Add color</button>
      </div>
      <div class="preview-text" id="lorePreview" style="color:#5a5648;font-size:14px">Lore preview will appear here</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Enchantments</div>
    <div class="enchant-list" id="enchantList">
      <div class="empty-enchants" id="emptyMsg">No enchantments added yet</div>
    </div>
    <hr class="divider">
    <div class="add-enchant-row">
      <div class="ac-wrap">
        <input type="text" id="enchSearch" placeholder="Search enchantment by name..." oninput="filterEnchants()" onkeydown="enchKeydown(event)" autocomplete="off">
        <div class="ac-list" id="enchDropdown"></div>
      </div>
      <button class="btn-sm" onclick="addEnchant()">+ Add</button>
    </div>
  </div>

  <button class="gen-btn" onclick="generateCommands()">✦ Generate Commands ✦</button>

  <div class="output-wrap" id="outputWrap">
    <div class="output-block" id="output"></div>
    <div class="output-actions">
      <button class="copy-btn" id="copyBtn" onclick="copyOut()">Copy all commands</button>
    </div>
  </div>

</div>

  {id:"excellentenchants:confusing_arrows",name:"Confusing Arrows"},
  {id:"excellentenchants:confusion",name:"Confusion"}
];

let nameColors = [], loreColors = [], enchantments = [], acIdx = -1, pendingId = '', pendingName = '';

function addColor(type) {
  const pick = document.getElementById(type + 'ColorPick').value;
  if (type === 'name') { nameColors.push(pick); renderChips('name'); }
  else { loreColors.push(pick); renderChips('lore'); }
  updatePreview();
}

function renderChips(type) {
  const arr = type === 'name' ? nameColors : loreColors;
  const el = document.getElementById(type + 'Chips');
  el.innerHTML = arr.map((c, i) =>
    `<span class="chip"><span class="chip-swatch" style="background:${c}"></span>${c}<span class="chip-rm" onclick="removeColor('${type}',${i})">×</span></span>`
  ).join('');
}

function removeColor(type, i) {
  if (type === 'name') nameColors.splice(i, 1);
  else loreColors.splice(i, 1);
  renderChips(type);
  updatePreview();
}

function makeGradientCSS(colors, text) {
  if (!text) return '';
  if (!colors.length) return `<span style="color:#e8e4d8">${text}</span>`;
  if (colors.length === 1) return `<span style="color:${colors[0]}">${text}</span>`;
  return `<span style="background:linear-gradient(90deg,${colors.join(',')});-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:500">${text}</span>`;
}

function updatePreview() {
  const n = document.getElementById('itemName').value;
  const l = document.getElementById('itemLore').value;
  const np = document.getElementById('namePreview');
  const lp = document.getElementById('lorePreview');
  if (n) { np.style.fontStyle = 'normal'; np.innerHTML = makeGradientCSS(nameColors, n); }
  else { np.style.fontStyle = 'normal'; np.style.color = '#5a5648'; np.innerHTML = 'Name preview will appear here'; }
  if (l) { lp.style.fontStyle = 'normal'; lp.innerHTML = makeGradientCSS(loreColors, l); }
  else { lp.style.fontStyle = 'normal'; lp.style.color = '#5a5648'; lp.innerHTML = 'Lore preview will appear here'; }
}

function buildGradientTag(colors, text) {
  if (!colors.length) return text;
  return `<gradient:${colors.join(':')}>` + text;
}

function filterEnchants() {
  const q = document.getElementById('enchSearch').value.toLowerCase().trim();
  const dd = document.getElementById('enchDropdown');
  if (!q) { dd.style.display = 'none'; return; }
  const hits = ENCHANTS.filter(e => e.name.toLowerCase().includes(q) || e.id.toLowerCase().includes(q)).slice(0, 12);
  if (!hits.length) { dd.style.display = 'none'; return; }
  acIdx = -1;
  dd.innerHTML = hits.map(e =>
    `<div class="ac-item" data-id="${e.id}" data-name="${e.name.replace(/'/g, "\\'")}" onclick="selectEnchant('${e.id}','${e.name.replace(/'/g, "\\'")}')">
      ${e.name}<span>${e.id}</span>
    </div>`
  ).join('');
  dd.style.display = 'block';
}

function enchKeydown(e) {
  const dd = document.getElementById('enchDropdown');
  const items = dd.querySelectorAll('.ac-item');
  if (e.key === 'ArrowDown') { acIdx = Math.min(acIdx + 1, items.length - 1); items.forEach((it, i) => it.classList.toggle('active', i === acIdx)); e.preventDefault(); }
  else if (e.key === 'ArrowUp') { acIdx = Math.max(acIdx - 1, 0); items.forEach((it, i) => it.classList.toggle('active', i === acIdx)); e.preventDefault(); }
  else if (e.key === 'Enter') {
    if (acIdx >= 0 && items[acIdx]) { const it = items[acIdx]; selectEnchant(it.dataset.id, it.dataset.name); }
    else addEnchant();
    e.preventDefault();
  }
  else if (e.key === 'Escape') { dd.style.display = 'none'; }
}

function selectEnchant(id, name) {
  document.getElementById('enchSearch').value = name;
  document.getElementById('enchDropdown').style.display = 'none';
  pendingId = id; pendingName = name;
}

function addEnchant() {
  let id = pendingId, name = pendingName;
  if (!id) {
    const q = document.getElementById('enchSearch').value.toLowerCase().trim();
    const hit = ENCHANTS.find(e => e.name.toLowerCase() === q || e.id.toLowerCase() === q);
    if (hit) { id = hit.id; name = hit.name; }
    else { alert('Please select an enchantment from the dropdown list.'); return; }
  }
  enchantments.push({ id, name, level: 1 });
  pendingId = ''; pendingName = '';
  document.getElementById('enchSearch').value = '';
  renderEnchants();
}

function renderEnchants() {
  const el = document.getElementById('enchantList');
  const empty = document.getElementById('emptyMsg');
  if (!enchantments.length) {
    el.innerHTML = '';
    el.appendChild(empty || (() => { const d = document.createElement('div'); d.className = 'empty-enchants'; d.id = 'emptyMsg'; d.textContent = 'No enchantments added yet'; return d; })());
    return;
  }
  el.innerHTML = enchantments.map((e, i) => `
    <div class="enchant-row">
      <div class="enchant-name">
        <strong>${e.name}</strong>
        <span>${e.id}</span>
      </div>
      <div class="level-wrap">
        <label>Lvl</label>
        <input type="number" min="0" max="100" value="${e.level}"
          oninput="enchantments[${i}].level=Math.min(100,Math.max(0,parseInt(this.value)||0));this.value=enchantments[${i}].level">
      </div>
      <button class="rm-btn" onclick="removeEnchant(${i})" title="Remove">×</button>
    </div>
  `).join('');
}

function removeEnchant(i) { enchantments.splice(i, 1); renderEnchants(); }

function generateCommands() {
  const name = document.getElementById('itemName').value.trim();
  const lore = document.getElementById('itemLore').value.trim();
  if (!name) { alert('Please enter an item name.'); return; }
  let lines = [];
  lines.push(`/itemname ${buildGradientTag(nameColors, name)}`);
  if (lore) lines.push(`/itemlore ${buildGradientTag(loreColors, lore)}`);
  enchantments.forEach(e => lines.push(`/excellentenchants enchant ${e.id} ${e.level}`));
  document.getElementById('output').textContent = lines.join('\n');
  const wrap = document.getElementById('outputWrap');
  wrap.style.display = 'block';
  wrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function copyOut() {
  const text = document.getElementById('output').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy all commands'; btn.classList.remove('copied'); }, 1800);
  });
}

document.addEventListener('click', e => {
  if (!e.target.closest('.ac-wrap')) document.getElementById('enchDropdown').style.display = 'none';
});
</script>
</body>
</html>
